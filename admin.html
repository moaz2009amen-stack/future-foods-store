<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Future Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00C853;--green-dark:#00A040;--orange:#FF6B35;--red:#F44336;--dark:#0D1117;--dark2:#161B22;--dark3:#21262D;--dark4:#30363D;--text:#E6EDF3;--text-muted:#8B949E;--border:rgba(255,255,255,0.08);--card-bg:rgba(255,255,255,0.04);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(0,200,83,0.07) 0%,transparent 50%)}
.login-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 30px rgba(0,200,83,0.3)}
.login-title{font-size:22px;font-weight:900;margin-bottom:6px}
.login-sub{color:var(--text-muted);font-size:14px;margin-bottom:28px}
.inp{width:100%;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:all 0.2s;margin-bottom:12px}
.inp:focus{border-color:var(--green)}
.btn-primary{width:100%;background:var(--green);border:none;color:#fff;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-primary:hover{background:var(--green-dark)}
.login-err{color:var(--orange);font-size:13px;margin-top:10px;display:none}
#app{display:none}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:240px;background:var(--dark2);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s}
@media(max-width:768px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-list{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all 0.2s;border:none;background:none;font-family:inherit;width:100%;text-align:right}
.nav-link:hover,.nav-link.active{background:rgba(0,200,83,0.1);color:var(--green)}
.nav-icon{font-size:18px}
.nav-badge{margin-right:auto;background:var(--orange);color:#fff;border-radius:100px;font-size:11px;font-weight:700;padding:2px 7px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.store-status{display:flex;align-items:center;justify-content:space-between;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.status-label{font-size:13px;font-weight:600}
.toggle{position:relative;width:44px;height:24px;background:var(--dark4);border-radius:100px;cursor:pointer;transition:all 0.2s;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:all 0.2s}
.toggle.on::after{right:calc(100% - 21px)}
.main{margin-right:240px;min-height:100vh;transition:margin 0.3s}
@media(max-width:768px){.main{margin-right:0}}
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,17,23,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:18px;font-weight:700}
.menu-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;display:none;padding:4px 8px}
@media(max-width:768px){.menu-btn{display:block}}
.content{padding:24px 20px;max-width:1200px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:14px}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-card h3{font-size:24px;font-weight:900}
.stat-card p{font-size:12px;color:var(--text-muted)}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-size:16px;font-weight:700}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--green);color:var(--green)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:12px 16px;text-align:right;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);background:var(--card-bg);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-pending{background:rgba(255,193,7,0.15);color:#FFC107}
.badge-confirmed{background:rgba(0,200,83,0.15);color:var(--green)}
.badge-preparing{background:rgba(33,150,243,0.15);color:#2196F3}
.badge-delivering{background:rgba(156,39,176,0.15);color:#9C27B0}
.badge-delivered{background:rgba(0,200,83,0.2);color:var(--green)}
.badge-cancelled{background:rgba(244,67,54,0.15);color:var(--red)}
.action-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-left:4px}
.action-btn:hover{border-color:var(--green);color:var(--green)}
.action-btn.danger:hover{border-color:var(--red);color:var(--red)}
.admin-products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:20px}
.admin-product-card{background:var(--dark3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.apc-img{height:140px;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.apc-img img{width:100%;height:100%;object-fit:cover}
.apc-body{padding:12px}
.apc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.apc-price{font-size:16px;font-weight:900;color:var(--green)}
.apc-stock{font-size:12px;color:var(--text-muted)}
.apc-actions{display:flex;gap:6px;margin-top:10px}
.apc-btn{flex:1;background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);padding:7px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:center}
.apc-btn:hover{border-color:var(--green);color:var(--green)}
.apc-btn.danger:hover{border-color:var(--red);color:var(--red)}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px}
.form-inp,.form-sel,.form-ta{width:100%;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:all 0.2s}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--green)}
.form-sel option{background:var(--dark2)}
.form-ta{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-save{flex:2;background:var(--green);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-save:hover{background:var(--green-dark)}
.order-items-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.oi{display:flex;justify-content:space-between;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px}
.loading{display:flex;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px;color:var(--text-muted)}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark2);border:1px solid var(--green);color:var(--text);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🛒</div>
    <div class="login-title">لوحة التحكم</div>
    <div class="login-sub">Future Foods — Admin Panel</div>
    <input class="inp" type="email" id="loginEmail" placeholder="البريد الإلكتروني">
    <input class="inp" type="password" id="loginPass" placeholder="كلمة المرور">
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="login-err" id="loginErr">بيانات غير صحيحة</div>
  </div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="s-logo-icon">🛒</div>
      <div><div style="font-size:14px;font-weight:700">Future Foods</div><div style="font-size:11px;color:var(--text-muted)">لوحة التحكم</div></div>
    </div>
    <nav class="nav-list">
      <button class="nav-link active" data-page="dashboard" onclick="navTo('dashboard',this)"><span class="nav-icon">📊</span> الرئيسية</button>
      <button class="nav-link" data-page="orders" onclick="navTo('orders',this)"><span class="nav-icon">📦</span> الطلبات <span class="nav-badge" id="pendingBadge" style="display:none">0</span></button>
      <button class="nav-link" data-page="products" onclick="navTo('products',this)"><span class="nav-icon">🛍️</span> المنتجات</button>
      <button class="nav-link" data-page="categories" onclick="navTo('categories',this)"><span class="nav-icon">📂</span> التصنيفات</button>
      <button class="nav-link" data-page="reports" onclick="navTo('reports',this)"><span class="nav-icon">📈</span> التقارير</button>
      <button class="nav-link" data-page="settings" onclick="navTo('settings',this)"><span class="nav-icon">⚙️</span> الإعدادات</button>
    </nav>
    <div class="sidebar-footer">
      <div class="store-status">
        <span class="status-label" id="storeStatusLabel">المحل: مفتوح</span>
        <button class="toggle on" id="storeToggle" onclick="toggleStore()"></button>
      </div>
      <button onclick="logout()" style="width:100%;margin-top:10px;background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px;border-radius:8px;font-family:inherit;cursor:pointer;font-size:13px">🚪 تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="page-title" id="pageTitle">الرئيسية</div>
      <div style="font-size:12px;color:var(--text-muted)" id="currentTime"></div>
    </div>
    <div class="content" id="pageContent"><div class="loading"><div class="spinner"></div></div></div>
  </main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <div class="modal-title" id="productModalTitle">إضافة منتج</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">الاسم (عربي) *</label><input class="form-inp" id="pNameAr" placeholder="اسم المنتج بالعربي"></div>
      <div class="form-group"><label class="form-label">الاسم (إنجليزي)</label><input class="form-inp" id="pNameEn" placeholder="Product name"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">السعر *</label><input class="form-inp" id="pPrice" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label class="form-label">السعر الأصلي (للخصم)</label><input class="form-inp" id="pOrigPrice" type="number" min="0" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">المخزون *</label><input class="form-inp" id="pStock" type="number" min="0" placeholder="0"></div>
      <div class="form-group"><label class="form-label">الوحدة</label><input class="form-inp" id="pUnitAr" placeholder="قطعة / كجم / لتر"></div>
    </div>
    <div class="form-group"><label class="form-label">التصنيف</label><select class="form-sel" id="pCategory"></select></div>
    <div class="form-group"><label class="form-label">رابط الصورة</label><input class="form-inp" id="pImage" placeholder="https://..."></div>
    <div class="form-group"><label class="form-label">الوصف (اختياري)</label><textarea class="form-ta" id="pDescAr" placeholder="وصف مختصر"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('productModal')">إلغاء</button>
      <button class="btn-save" onclick="saveProduct()">حفظ</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="catModal">
  <div class="modal-box">
    <div class="modal-title" id="catModalTitle">إضافة تصنيف</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">الاسم (عربي) *</label><input class="form-inp" id="cNameAr" placeholder="اسم التصنيف"></div>
      <div class="form-group"><label class="form-label">الاسم (إنجليزي)</label><input class="form-inp" id="cNameEn" placeholder="Category name"></div>
    </div>
    <div class="form-group"><label class="form-label">الأيقونة (emoji)</label><input class="form-inp" id="cIcon" placeholder="🛒"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('catModal')">إلغاء</button>
      <button class="btn-save" onclick="saveCat()">حفظ</button>
    </div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal-box">
    <div class="modal-title">تفاصيل الطلب</div>
    <div id="orderModalContent"></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('orderModal')">إغلاق</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='/api';
let ADMIN_EMAIL=localStorage.getItem('ff_email')||'admin@futurefood.com';
let ADMIN_PASS=localStorage.getItem('ff_pass')||'admin123';

let currentPage='dashboard',allOrders=[],allProducts=[],allCategories=[],editingProductId=null,editingCatId=null,storeOpen=true,orderFilter='all';

// AUTH
function doLogin(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value;if(e===ADMIN_EMAIL&&p===ADMIN_PASS){sessionStorage.setItem('ff_admin','1');startApp()}else document.getElementById('loginErr').style.display='block'}
function logout(){sessionStorage.removeItem('ff_admin');location.reload()}
function startApp(){document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='block';initApp()}

// INIT
async function initApp(){updateClock();setInterval(updateClock,1000);await loadSettings();await loadCategories();await loadPage('dashboard');startRealtime()}
function updateClock(){document.getElementById('currentTime').textContent=new Date().toLocaleString('ar-EG')}
async function loadSettings(){try{const s=await fetch(`${API}/settings`).then(r=>r.json());if(s){storeOpen=s.is_open;updateStoreToggle()}}catch(e){}}
async function loadCategories(){try{allCategories=await fetch(`${API}/categories`).then(r=>r.json())}catch(e){}}

// NAV
function navTo(page,btn){document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));btn.classList.add('active');closeSidebar();loadPage(page)}
async function loadPage(page){currentPage=page;const titles={dashboard:'الرئيسية',orders:'الطلبات',products:'المنتجات',categories:'التصنيفات',reports:'التقارير',settings:'الإعدادات'};document.getElementById('pageTitle').textContent=titles[page]||'';document.getElementById('pageContent').innerHTML='<div class="loading"><div class="spinner"></div></div>';if(page==='dashboard')await renderDashboard();else if(page==='orders')await renderOrders();else if(page==='products')await renderProducts();else if(page==='categories')await renderCategories();else if(page==='reports')await renderReports();else if(page==='settings')await renderSettings()}

// DASHBOARD
async function renderDashboard(){try{const[orders,products]=await Promise.all([fetch(`${API}/orders`).then(r=>r.json()),fetch(`${API}/products`).then(r=>r.json())]);allOrders=orders;allProducts=products;const pending=orders.filter(o=>o.status==='pending').length;const today=orders.filter(o=>new Date(o.created_at).toDateString()===new Date().toDateString());const todayRev=today.reduce((s,o)=>o.status!=='cancelled'?s+parseFloat(o.total):s,0);const totalRev=orders.reduce((s,o)=>o.status!=='cancelled'?s+parseFloat(o.total):s,0);updatePendingBadge(pending);document.getElementById('pageContent').innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon" style="background:rgba(255,193,7,0.15)">⏳</div><div><h3>${pending}</h3><p>بانتظار التأكيد</p></div></div><div class="stat-card"><div class="stat-icon" style="background:rgba(0,200,83,0.15)">📦</div><div><h3>${today.length}</h3><p>طلبات اليوم</p></div></div><div class="stat-card"><div class="stat-icon" style="background:rgba(33,150,243,0.15)">💰</div><div><h3>${todayRev.toFixed(0)} ج.م</h3><p>مبيعات اليوم</p></div></div><div class="stat-card"><div class="stat-icon" style="background:rgba(156,39,176,0.15)">🏦</div><div><h3>${totalRev.toFixed(0)} ج.م</h3><p>إجمالي المبيعات</p></div></div></div><div class="card"><div class="card-header"><div class="card-title">آخر الطلبات</div></div><div class="table-wrap"><table><thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>الإجراء</th></tr></thead><tbody>${orders.slice(0,8).map(o=>`<tr><td><span style="font-family:monospace;font-size:12px">${o.order_number}</span></td><td>${o.customer_name}<br><span style="font-size:11px;color:var(--text-muted)">${o.customer_phone}</span></td><td style="color:var(--green);font-weight:700">${o.total} ج.م</td><td>${statusBadge(o.status)}</td><td>${o.status==='pending'?`<button class="action-btn" onclick="updateOrderStatus('${o.id}','confirmed')">✅ تأكيد</button><button class="action-btn danger" onclick="updateOrderStatus('${o.id}','cancelled')">❌</button>`:`<button class="action-btn" onclick="viewOrder('${o.id}')">عرض</button>`}</td></tr>`).join('')}</tbody></table></div></div>`}catch(e){document.getElementById('pageContent').innerHTML='<div class="empty-state"><div style="font-size:48px">⚠️</div><p>خطأ في تحميل البيانات — تحقق من إعدادات API</p></div>'}}

// ORDERS
async function renderOrders(){try{allOrders=await fetch(`${API}/orders`).then(r=>r.json());buildOrdersTable()}catch(e){}}
function buildOrdersTable(){const orders=orderFilter==='all'?allOrders:allOrders.filter(o=>o.status===orderFilter);const fl=['all','pending','confirmed','preparing','delivering','delivered','cancelled'];const fl2={all:'الكل',pending:'جديد',confirmed:'مؤكد',preparing:'يُحضَّر',delivering:'في الطريق',delivered:'مُسلَّم',cancelled:'ملغي'};document.getElementById('pageContent').innerHTML=`<div class="card"><div class="card-header"><div class="card-title">الطلبات (${orders.length})</div><div class="filters">${fl.map(f=>`<button class="filter-btn ${orderFilter===f?'active':''}" onclick="setOrderFilter('${f}')">${fl2[f]}</button>`).join('')}</div></div><div class="table-wrap"><table><thead><tr><th>رقم الطلب</th><th>العميل</th><th>العنوان</th><th>الإجمالي</th><th>الدفع</th><th>الحالة</th><th>التاريخ</th><th>الإجراء</th></tr></thead><tbody>${orders.length?orders.map(o=>`<tr><td><span style="font-family:monospace;font-size:11px">${o.order_number}</span></td><td>${o.customer_name}<br><span style="font-size:11px;color:var(--text-muted)">${o.customer_phone}</span></td><td style="max-width:140px;font-size:12px">${o.customer_address}</td><td style="color:var(--green);font-weight:700">${o.total} ج.م</td><td style="font-size:12px">${o.payment_method==='cash'?'💵 كاش':'📱 إلكتروني'}</td><td>${statusBadge(o.status)}</td><td style="font-size:11px;color:var(--text-muted)">${new Date(o.created_at).toLocaleString('ar-EG')}</td><td><button class="action-btn" onclick="viewOrder('${o.id}')">👁</button><button class="action-btn" onclick="printOrder('${o.id}')">🖨️</button>${o.status==='pending'?`<button class="action-btn" onclick="updateOrderStatus('${o.id}','confirmed')">✅</button><button class="action-btn danger" onclick="updateOrderStatus('${o.id}','cancelled')">❌</button>`:''}${o.status==='confirmed'?`<button class="action-btn" onclick="updateOrderStatus('${o.id}','preparing')">👨‍🍳</button>`:''}${o.status==='preparing'?`<button class="action-btn" onclick="updateOrderStatus('${o.id}','delivering')">🚴</button>`:''}${o.status==='delivering'?`<button class="action-btn" onclick="updateOrderStatus('${o.id}','delivered')">🎉</button>`:''}</td></tr>`).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:40px">لا توجد طلبات</td></tr>'}</tbody></table></div></div>`}
function setOrderFilter(f){orderFilter=f;buildOrdersTable()}
async function updateOrderStatus(id,status){try{await fetch(`${API}/orders?id=${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});allOrders=allOrders.map(o=>o.id===id?{...o,status}:o);if(currentPage==='orders')buildOrdersTable();else await renderDashboard();showToast('✅ تم تحديث الحالة');updatePendingBadge(allOrders.filter(o=>o.status==='pending').length)}catch(e){showToast('❌ خطأ')}}
async function viewOrder(id){const order=allOrders.find(o=>o.id===id);if(!order)return;try{const data=await fetch(`${API}/orders?id=${id}`).then(r=>r.json());const items=data.items||[];const sl={pending:'⏳ بانتظار التأكيد',confirmed:'✅ مؤكد',preparing:'👨‍🍳 جارٍ التحضير',delivering:'🚴 في الطريق',delivered:'🎉 تم التوصيل',cancelled:'❌ ملغي'};document.getElementById('orderModalContent').innerHTML=`<div style="margin-bottom:16px"><div style="font-size:20px;font-weight:900;color:var(--green);margin-bottom:4px">${order.order_number}</div><div>${sl[order.status]}</div></div><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px;display:grid;gap:6px"><div><b>الاسم:</b> ${order.customer_name}</div><div><b>الهاتف:</b> ${order.customer_phone}</div><div><b>العنوان:</b> ${order.customer_address}</div>${order.customer_notes?`<div><b>ملاحظات:</b> ${order.customer_notes}</div>`:''}<div><b>الدفع:</b> ${order.payment_method==='cash'?'💵 كاش':'📱 إلكتروني'}</div></div><div class="order-items-list">${items.map(i=>`<div class="oi"><span>${i.product_name_ar} × ${i.quantity}</span><span style="color:var(--green);font-weight:700">${i.subtotal} ج.م</span></div>`).join('')}</div><div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:13px;display:grid;gap:6px"><div style="display:flex;justify-content:space-between"><span>المجموع:</span><span>${order.subtotal} ج.م</span></div><div style="display:flex;justify-content:space-between"><span>التوصيل:</span><span>${order.delivery_fee} ج.م</span></div><div style="display:flex;justify-content:space-between;font-size:16px;font-weight:900;color:var(--green);margin-top:6px"><span>الإجمالي:</span><span>${order.total} ج.م</span></div></div>`;document.getElementById('orderModal').classList.add('open')}catch(e){}}

async function saveProduct(){const data={name_ar:document.getElementById('pNameAr').value.trim(),name_en:document.getElementById('pNameEn').value.trim(),price:parseFloat(document.getElementById('pPrice').value)||0,original_price:parseFloat(document.getElementById('pOrigPrice').value)||null,stock:parseInt(document.getElementById('pStock').value)||0,unit_ar:document.getElementById('pUnitAr').value.trim()||'قطعة',unit_en:'piece',category_id:document.getElementById('pCategory').value||null,image_url:document.getElementById('pImage').value.trim()||null,description_ar:document.getElementById('pDescAr').value.trim()||null};if(!data.name_ar||!data.price){showToast('⚠️ أدخل الاسم والسعر');return}try{if(editingProductId){await fetch(`${API}/products?id=${editingProductId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}else{data.is_available=true;await fetch(`${API}/products`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}closeModal('productModal');showToast('✅ تم الحفظ');await renderProducts()}catch(e){showToast('❌ خطأ في الحفظ')}}

  document.getElementById('newEmail').value='';
  document.getElementById('newPass').value='';
  document.getElementById('currentPass').value='';
}

// REPORTS
async function renderReports(){
  try{
    const orders=await fetch(`${API}/orders`).then(r=>r.json());
    const delivered=orders.filter(o=>o.status==='delivered');
    const totalRev=delivered.reduce((s,o)=>s+parseFloat(o.total),0);
    const avgOrder=delivered.length?totalRev/delivered.length:0;

    // Group by day (last 7 days)
    const days={};
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const key=d.toLocaleDateString('ar-EG',{weekday:'short',month:'numeric',day:'numeric'});
      days[key]={orders:0,revenue:0};
    }
    orders.forEach(o=>{
      const d=new Date(o.created_at);
      const key=d.toLocaleDateString('ar-EG',{weekday:'short',month:'numeric',day:'numeric'});
      if(days[key]&&o.status!=='cancelled'){days[key].orders++;days[key].revenue+=parseFloat(o.total)}
    });

    const maxRev=Math.max(...Object.values(days).map(d=>d.revenue),1);

    document.getElementById('pageContent').innerHTML=`
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(0,200,83,0.15)">✅</div><div><h3>${delivered.length}</h3><p>طلبات مكتملة</p></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(33,150,243,0.15)">💰</div><div><h3>${totalRev.toFixed(0)} ج.م</h3><p>إجمالي الإيرادات</p></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(156,39,176,0.15)">📊</div><div><h3>${avgOrder.toFixed(0)} ج.م</h3><p>متوسط قيمة الطلب</p></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(255,193,7,0.15)">❌</div><div><h3>${orders.filter(o=>o.status==='cancelled').length}</h3><p>طلبات ملغية</p></div></div>
    </div>
    <div class="card" style="padding:24px">
      <div class="card-title" style="margin-bottom:20px">📈 المبيعات — آخر 7 أيام</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:160px;margin-bottom:12px">
        ${Object.entries(days).map(([day,data])=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:11px;color:var(--green);font-weight:700">${data.revenue>0?data.revenue.toFixed(0):''}</div>
            <div style="width:100%;background:${data.revenue>0?'var(--green)':'var(--dark3)'};border-radius:6px 6px 0 0;height:${Math.max((data.revenue/maxRev)*120,4)}px;transition:all 0.3s"></div>
            <div style="font-size:10px;color:var(--text-muted);text-align:center">${day}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">تفاصيل الطلبات المكتملة</div></div>
      <div class="table-wrap">
        <table><thead><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>التاريخ</th></tr></thead>
        <tbody>${delivered.slice(0,20).map(o=>`<tr><td style="font-family:monospace;font-size:11px">${o.order_number}</td><td>${o.customer_name}</td><td style="color:var(--green);font-weight:700">${o.total} ج.م</td><td style="font-size:11px;color:var(--text-muted)">${new Date(o.created_at).toLocaleDateString('ar-EG')}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }catch(e){}
}

// SOUND NOTIFICATION
function playNotifSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3);
      o.start(ctx.currentTime+i*0.15);
      o.stop(ctx.currentTime+i*0.15+0.3);
    });
  }catch(e){}
}

// REALTIME POLL
function startRealtime(){setInterval(async()=>{if(currentPage==='orders'||currentPage==='dashboard'){try{const newOrders=await fetch(`${API}/orders`).then(r=>r.json());const newPending=newOrders.filter(o=>o.status==='pending').length;const oldPending=allOrders.filter(o=>o.status==='pending').length;if(newPending>oldPending){playNotifSound();showToast('🔔 طلب جديد!')}allOrders=newOrders;updatePendingBadge(newPending);if(currentPage==='orders')buildOrdersTable();else if(currentPage==='dashboard')renderDashboard()}catch(e){}}},15000)}

// HELPERS
function statusBadge(status){const map={pending:'badge-pending ⏳ بانتظار',confirmed:'badge-confirmed ✅ مؤكد',preparing:'badge-preparing 👨‍🍳 يُحضَّر',delivering:'badge-delivering 🚴 في الطريق',delivered:'badge-delivered 🎉 مُسلَّم',cancelled:'badge-cancelled ❌ ملغي'};const[cls,...rest]=(map[status]||'badge-pending غير معروف').split(' ');return`<span class="badge ${cls}">${rest.join(' ')}</span>`}
function updatePendingBadge(n){const b=document.getElementById('pendingBadge');b.textContent=n;b.style.display=n>0?'inline':'none'}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open')}

if(sessionStorage.getItem('ff_admin'))startApp();
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
